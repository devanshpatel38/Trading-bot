testnet: true
symbol: BTC
interval: 1h
data:
  lookback: 5000
strategies:
  ema_trend:
    enabled: true
    weight: 1.0
    params: {fast: 20, slow: 200, atr_period: 14, pullback_atr: 0.5}
    grid: {pullback_atr: [0.5, 1.0]}
  rsi_meanrev:
    enabled: true
    weight: 1.0
    params: {period: 14, oversold: 30.0, overbought: 70.0, ema_period: 50, atr_period: 14, mean_atr: 1.5}
    grid: {oversold: [25, 30]}
  bb_squeeze:
    enabled: true    # re-enabled for faithful doc 5/5-unanimous test (doc-spec: squeeze/breakout/volume/candle)
    weight: 1.0
    params: {period: 20, num_std: 2.0, squeeze_lookback: 50, squeeze_pct: 0.30, vol_lookback: 20}
    grid: {period: [20, 30]}
  fvg:
    enabled: true
    weight: 1.0
    params: {atr_period: 14, ema_period: 200, lookback: 50, fresh_bars: 15, proximity_atr: 0.25, min_gap_atr: 0.08}
    grid: {proximity_atr: [0.25, 0.5]}
  macd_momentum:
    enabled: true
    weight: 1.0
    params: {fast: 12, slow: 26, signal: 9, ema_period: 200, cross_lookback: 3}
    grid: {fast: [8, 12]}
aggregator:
  threshold: 50
  min_agree: 5
  margin: 15
backtest:
  days: 180
  rr: 3.0
  atr_period: 14
  atr_mult: 3.0
  warmup_bars: 815   # EMA800 needs ~800 bars to seed
  htf_period: 800
  fee: 0.0005       # Binance USDT-M perp taker 0.05% (VIP0; 0.045% if paying fees in BNB)
  slippage: 0.0002  # 2 bps
oi_filter:
  # OI-regime overlay: take the signal only when the 30-day smoothed open-interest delta
  # is FLAT (chop, +/-2%); stand aside otherwise. Management is PLAIN 1:3 — market entry,
  # 3xATR stop, 3R target, no partial/breakeven (SL+TP rest on the exchange, nothing to
  # monitor). Signals/execution on the Binance perp feed.
  # 2026-07: relaxed chop entry 5/5 -> 4/5 for the demo (backtest ~1.5x frequency, ~2x
  # return $158k->$317k, but deeper drawdown -29% -> -43%). Still BTC-only (fails ETH OOS).
  enabled: true
  source: BTCUSDT       # Binance USDT-M perp (candles + open interest)
  window_hours: 720     # 30-day delta lookback
  avg_hours: 24         # smooth both endpoints over 24h (kills reference-spike noise)
  trade_regime: chop    # only enter in flat-OI chop
  chop_min_agree: 4     # chop entry needs 4-of-5 agreement (was 5/5)
  partial_frac: 0.0     # plain 1:3 -> no partial scale-out
  partial_r: 0.0
  breakeven_r: 0.0      # plain 1:3 -> no breakeven move
  recent_days: 50       # live OI fetch window
  risk_pct: 0.05        # risk per trade as fraction of capital (5%; ~28% max DD. lower to 0.02-0.03 for a gentler ride)