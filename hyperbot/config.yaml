testnet: true
symbol: BTC
interval: 1h
data:
  lookback: 5000
strategies:
  ema_trend:
    enabled: true
    weight: 1.0
    params: {fast: 20, slow: 200, atr_period: 14, pullback_atr: 0.5}
    grid: {pullback_atr: [0.5, 1.0]}
  rsi_meanrev:
    enabled: true
    weight: 1.0
    params: {period: 14, oversold: 30.0, overbought: 70.0, ema_period: 50, atr_period: 14, mean_atr: 1.5}
    grid: {oversold: [25, 30]}
  bb_squeeze:
    enabled: false   # dropped: HTF rehab failed ablation (agreed-WR ~25% < dissented-WR 33-40%); run 4-of-4 on remaining four
    weight: 1.0
    params: {period: 20, num_std: 2.0, squeeze_lookback: 50, squeeze_quantile: 0.25, ema_period: 200}
    grid: {period: [20, 30]}
  fvg:
    enabled: true
    weight: 1.0
    params: {atr_period: 14, proximity_atr: 0.25, fvg_lookback: 20, freshness_bars: 15, ema_period: 200}
    grid: {proximity_atr: [0.25, 0.5]}
  macd_momentum:
    enabled: true
    weight: 1.0
    params: {fast: 12, slow: 26, signal: 9, ema_period: 200, cross_lookback: 3}
    grid: {fast: [8, 12]}
aggregator:
  threshold: 75
  min_agree: 4
  margin: 15
backtest:
  days: 180
  rr: 3.0
  atr_period: 14
  atr_mult: 1.5
  warmup_bars: 215