testnet: true
symbol: BTC
interval: 1h
data:
  lookback: 5000
strategies:
  ema_trend:
    enabled: true
    weight: 1.0
    params: {fast: 20, slow: 200, atr_period: 14, pullback_atr: 0.5}
    grid: {pullback_atr: [0.5, 1.0]}
  rsi_meanrev:
    enabled: true
    weight: 1.0
    params: {period: 14, oversold: 30.0, overbought: 70.0, ema_period: 50, atr_period: 14, mean_atr: 1.5}
    grid: {oversold: [25, 30]}
  bb_squeeze:
    enabled: true    # re-enabled for faithful doc 5/5-unanimous test (doc-spec: squeeze/breakout/volume/candle)
    weight: 1.0
    params: {period: 20, num_std: 2.0, squeeze_lookback: 50, squeeze_pct: 0.30, vol_lookback: 20}
    grid: {period: [20, 30]}
  fvg:
    enabled: true
    weight: 1.0
    params: {atr_period: 14, ema_period: 200, lookback: 50, fresh_bars: 15, proximity_atr: 0.25, min_gap_atr: 0.08}
    grid: {proximity_atr: [0.25, 0.5]}
  macd_momentum:
    enabled: true
    weight: 1.0
    params: {fast: 12, slow: 26, signal: 9, ema_period: 200, cross_lookback: 3}
    grid: {fast: [8, 12]}
aggregator:
  threshold: 50
  min_agree: 5
  margin: 15
backtest:
  days: 180
  rr: 3.0
  atr_period: 14
  atr_mult: 3.0
  warmup_bars: 815   # EMA800 needs ~800 bars to seed
  htf_period: 800
  fee: 0.00045      # Hyperliquid taker 0.045%
  slippage: 0.0002  # 2 bps
oi_filter:
  # OI-regime overlay (validated 2026-06): only take the unanimous 5/5 signal when the
  # 30-day smoothed open-interest delta is FLAT (chop, +/-2%); stand aside otherwise.
  # Manage with a 50% scale-out at 2R + stop-to-breakeven, runner to 3R. EMA800 filter on.
  enabled: true
  source: BTCUSDT       # Binance USDT-M perp for open interest
  window_hours: 720     # 30-day delta lookback
  avg_hours: 24         # smooth both endpoints over 24h (kills reference-spike noise)
  trade_regime: chop    # only enter in flat-OI chop
  partial_frac: 0.5     # take 50% off at the partial level
  partial_r: 2.0        # partial + breakeven trigger at 2R
  breakeven_r: 2.0      # move stop to entry at 2R
  recent_days: 50       # live OI fetch window